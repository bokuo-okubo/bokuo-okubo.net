<style>
  /* ---- 24-style seven-segment display font ---- */
  @font-face {
    font-family: 'DSEG7';
    src: url('https://cdn.jsdelivr.net/gh/keshikan/DSEG@v0.46/fonts/DSEG7-Classic/DSEG7Classic-Bold.woff2') format('woff2'),
         url('https://cdn.jsdelivr.net/gh/keshikan/DSEG@v0.46/fonts/DSEG7-Classic/DSEG7Classic-Bold.woff') format('woff');
    font-weight: bold;
    font-display: swap;
  }
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  :root{
    --bg:#000000;
    --red:#ff2d12;
    --red-bright:#ff6a45;
    --red-dim:#3a0c04;
    --amber:#ffb000;
    --amber-bright:#ffd24a;
    --ink:#e9e4d8;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Share Tech Mono',monospace;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:clamp(18px,4vh,40px);
    padding:24px;
    overflow:hidden;
    position:relative;
  }

  /* CRT scanlines + vignette */
  .crt{
    position:fixed; inset:0; pointer-events:none; z-index:50;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.28) 3px, rgba(0,0,0,0) 4px),
      radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,0.85) 100%);
    animation:roll 8s linear infinite;
  }
  @keyframes roll{from{background-position:0 0,0 0;}to{background-position:0 4px,0 0;}}

  /* intertitle */
  .intertitle{
    text-align:center;
    color:var(--amber);
    max-width:760px;
    line-height:1.9;
    font-size:clamp(11px,2.4vw,16px);
    letter-spacing:.14em;
    text-shadow:0 0 12px rgba(255,176,0,.45);
    animation:flicker 6s infinite steps(40);
  }
  .intertitle .rt{color:var(--amber-bright); font-weight:bold;}
  @keyframes flicker{
    0%,97%,100%{opacity:1;} 97.5%{opacity:.55;} 98%{opacity:1;} 98.5%{opacity:.7;}
  }

  /* logo */
  .logo{
    font-family:'DSEG7','Share Tech Mono',monospace;
    color:var(--amber);
    font-size:clamp(34px,9vw,72px);
    letter-spacing:.06em;
    text-shadow:0 0 18px rgba(255,176,0,.6), 0 0 4px rgba(255,176,0,.9);
    line-height:1;
  }

  .heading{
    text-align:center; letter-spacing:.34em; font-size:clamp(13px,3vw,18px);
    color:var(--red-bright); text-shadow:0 0 10px rgba(255,45,18,.5);
  }

  /* clock */
  .clock{
    display:flex; align-items:flex-start; justify-content:center;
    gap:clamp(4px,1.4vw,16px);
    filter:drop-shadow(0 0 22px rgba(255,45,18,.35));
  }
  .unit{display:flex; flex-direction:column; align-items:center; gap:8px;}
  .digits{
    position:relative;
    font-family:'DSEG7','Share Tech Mono',monospace;
    font-size:clamp(44px,15vw,128px);
    line-height:1;
  }
  /* ghost (off) segments behind the live digits */
  .digits .ghost{ position:absolute; inset:0; color:var(--red-dim); }
  .digits .live{ position:relative; color:var(--red);
    text-shadow:0 0 8px var(--red), 0 0 22px rgba(255,45,18,.7), 0 0 44px rgba(255,45,18,.35);}
  .ticking .digits .live{animation:pulse 1s steps(2) infinite;}
  @keyframes pulse{0%{filter:brightness(1);}50%{filter:brightness(1.18);}100%{filter:brightness(1);}}

  .colon{
    font-family:'DSEG7','Share Tech Mono',monospace;
    font-size:clamp(34px,11vw,104px);
    color:var(--red); align-self:center;
    text-shadow:0 0 10px var(--red), 0 0 26px rgba(255,45,18,.6);
    transform:translateY(-6%);
  }
  .ticking .colon{animation:blink 1s steps(1) infinite;}
  @keyframes blink{0%,49%{opacity:1;}50%,100%{opacity:.12;}}

  .ulabel{
    color:var(--amber); font-size:clamp(9px,2.2vw,13px); letter-spacing:.4em;
    text-shadow:0 0 8px rgba(255,176,0,.4);
  }

  .target{ color:var(--ink); opacity:.65; letter-spacing:.22em; font-size:clamp(10px,2.4vw,14px); }

  .eyebrow{
    color:var(--ink); opacity:.7; letter-spacing:.42em; font-size:clamp(9px,2.2vw,12px);
    text-transform:uppercase;
  }

  /* CTU mission briefing terminal */
  .briefing{
    width:min(760px,92vw);
    border:1px solid rgba(255,176,0,.35);
    background:linear-gradient(rgba(255,176,0,.04),rgba(255,176,0,.01));
    padding:16px clamp(14px,3vw,26px);
    box-shadow:0 0 24px rgba(255,176,0,.08), inset 0 0 30px rgba(255,176,0,.05);
  }
  .brief-head{
    color:var(--amber-bright); letter-spacing:.2em; font-size:clamp(11px,2.6vw,15px);
    margin-bottom:12px; text-shadow:0 0 10px rgba(255,176,0,.5);
  }
  .brief-row{
    display:flex; align-items:baseline; gap:8px;
    color:var(--amber); font-size:clamp(10px,2.5vw,14px); letter-spacing:.06em;
    padding:5px 0; line-height:1.5;
  }
  .brief-row .k{ flex:0 0 auto; opacity:.85; }
  .brief-row .dots{ flex:1 1 auto; border-bottom:1px dotted rgba(255,176,0,.3); transform:translateY(-3px); min-width:14px; }
  .brief-row .v{ flex:0 1 auto; text-align:right; }
  .brief-row .v b{ color:var(--red-bright); font-weight:bold; text-shadow:0 0 8px rgba(255,45,18,.5); }
  .cursor{ animation:caret 1s steps(1) infinite; color:var(--amber-bright); }
  @keyframes caret{0%,49%{opacity:1;}50%,100%{opacity:0;}}
  .arrived .briefing{ border-color:rgba(255,210,74,.6); box-shadow:0 0 30px rgba(255,176,0,.18); }

  /* start button */
  .controls{display:flex; gap:14px; flex-wrap:wrap; justify-content:center;}
  button{
    font-family:'Share Tech Mono',monospace;
    background:transparent; color:var(--amber);
    border:1px solid var(--amber);
    padding:11px 20px; letter-spacing:.24em; font-size:13px;
    cursor:pointer; text-transform:uppercase;
    transition:background .15s, color .15s, box-shadow .15s;
  }
  button:hover,button:focus-visible{
    background:var(--amber); color:#000; outline:none;
    box-shadow:0 0 18px rgba(255,176,0,.6);
  }
  button[aria-pressed="true"]{ border-color:var(--red); color:var(--red); }
  button[aria-pressed="true"]:hover{ background:var(--red); color:#000; box-shadow:0 0 18px rgba(255,45,18,.6);}

  /* arrival state */
  .arrived .clock{filter:drop-shadow(0 0 30px rgba(255,176,0,.6));}
  .arrived .digits .live{color:var(--amber); text-shadow:0 0 10px var(--amber),0 0 30px rgba(255,176,0,.7);}
  .arrived .colon{color:var(--amber); animation:none; opacity:1; text-shadow:0 0 12px var(--amber);}
  .banner{
    display:none; text-align:center; color:var(--amber-bright);
    font-size:clamp(16px,4.5vw,30px); letter-spacing:.18em;
    text-shadow:0 0 18px rgba(255,176,0,.7);
    animation:bannerpulse 1.4s ease-in-out infinite;
  }
  .arrived .banner{display:block;}
  .arrived .heading,.arrived .controls{display:none;}
  @keyframes bannerpulse{0%,100%{opacity:.7;}50%{opacity:1;}}

  @media (prefers-reduced-motion:reduce){
    .crt{animation:none;} .intertitle{animation:none;}
    .ticking .digits .live,.ticking .colon,.banner{animation:none;}
    .ticking .colon{opacity:1;} .cursor{animation:none;opacity:1;}
  }
</style>
</head>
<body>
  <div class="crt"></div>

  <div class="heading" id="heading">大久保さん 着任まで</div>

  <div class="clock" id="clock" aria-live="off">
    <div class="unit">
      <div class="digits"><span class="ghost">88</span><span class="live" id="dd">00</span></div>
      <div class="ulabel">DAYS</div>
    </div>
    <div class="colon">:</div>
    <div class="unit">
      <div class="digits"><span class="ghost">88</span><span class="live" id="hh">00</span></div>
      <div class="ulabel">HOURS</div>
    </div>
    <div class="colon">:</div>
    <div class="unit">
      <div class="digits"><span class="ghost">88</span><span class="live" id="mm">00</span></div>
      <div class="ulabel">MIN</div>
    </div>
    <div class="colon">:</div>
    <div class="unit">
      <div class="digits"><span class="ghost">88</span><span class="live" id="ss">00</span></div>
      <div class="ulabel">SEC</div>
    </div>
  </div>

  <div class="banner" id="banner">大久保さん、着任！ ── 2兆円 作戦開始</div>

  <div class="target">TARGET&nbsp;:&nbsp;2026.07.01&nbsp;00:00:00</div>

  <div class="briefing" id="briefing">
    <div class="brief-head">▸ MISSION BRIEFING ── 着任と同時に発動</div>
    <div class="brief-row"><span class="k">対象資金</span><span class="dots"></span><span class="v">¥ 2,000,000,000,000 を<b>こねくり回す</b></span></div>
    <div class="brief-row"><span class="k">最終目標</span><span class="dots"></span><span class="v">日本のGDPを <b>＋1.0%</b> 引き上げる</span></div>
    <div class="brief-row"><span class="k">作戦要員</span><span class="dots"></span><span class="v">大久保さん<span class="cursor">_</span></span></div>
  </div>

  <div class="controls">
    <button id="soundBtn" aria-pressed="false">▶ SOUND ON</button>
  </div>

<script>
  const pad = n => String(n).padStart(2,'0');
  const dd=document.getElementById('dd'), hh=document.getElementById('hh'),
        mm=document.getElementById('mm'), ss=document.getElementById('ss');
  const body=document.body, banner=document.getElementById('banner');

  // Target: midnight, July 1 of the current year (rolls to next year if already past)
  function getTarget(){
    const now=new Date();
    let t=new Date(now.getFullYear(),6,1,0,0,0,0); // month 6 = July
    if(t.getTime()<=now.getTime()) t=new Date(now.getFullYear()+1,6,1,0,0,0,0);
    return t;
  }
  const target=getTarget();

  // ---- audio: the 24 beep ----
  let actx=null, soundOn=false;
  function beep(freq,dur,vol){
    if(!actx) return;
    const o=actx.createOscillator(), g=actx.createGain();
    o.type='square'; o.frequency.value=freq;
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
    o.connect(g).connect(actx.destination);
    o.start(); o.stop(actx.currentTime+dur);
  }
  const soundBtn=document.getElementById('soundBtn');
  soundBtn.addEventListener('click',()=>{
    if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') actx.resume();
    soundOn=!soundOn;
    soundBtn.setAttribute('aria-pressed', soundOn);
    soundBtn.textContent = soundOn ? '■ SOUND OFF' : '▶ SOUND ON';
    if(soundOn) beep(1318,0.06,0.18); // confirmation tick
  });

  let lastSec=-1, finished=false;
  function tick(){
    const now=Date.now();
    let diff=target.getTime()-now;

    if(diff<=0){
      dd.textContent=hh.textContent=mm.textContent=ss.textContent='00';
      if(!finished){
        finished=true;
        body.classList.remove('ticking');
        body.classList.add('arrived');
        if(soundOn){ beep(880,0.12,0.2); setTimeout(()=>beep(1318,0.18,0.2),140);
                     setTimeout(()=>beep(1760,0.3,0.2),320); }
      }
      return;
    }

    body.classList.add('ticking');
    const totalSec=Math.floor(diff/1000);
    const d=Math.floor(totalSec/86400);
    const h=Math.floor((totalSec%86400)/3600);
    const m=Math.floor((totalSec%3600)/60);
    const s=totalSec%60;
    dd.textContent=pad(d); hh.textContent=pad(h); mm.textContent=pad(m); ss.textContent=pad(s);

    if(s!==lastSec){
      lastSec=s;
      if(soundOn){
        if(s===0) { beep(1318,0.07,0.16); setTimeout(()=>beep(1568,0.09,0.16),90); } // minute roll: double beep
        else beep(1318,0.05,0.12); // per-second tick
      }
    }
  }

  tick();
  setInterval(tick,200);
</script>
</body>
